name: Build umx for R

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  schedule:
    # Run full matrix every Monday at 06:00 UTC
    - cron: '0 6 * * 1'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Lightweight CI on every push and PR (Linux + release R only)
  quick:
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up R (release)
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
          use-public-rspm: true

      # Quick CI: no GenomicSEM (github install is slow/flaky; vignette is eval=FALSE).
      # Vignettes are skipped here — modification_indices/profile-CI knit is multi-hour;
      # full vignette build stays on weekly matrix / workflow_dispatch.
      - name: Install Package Dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::remotes
            any::rcmdcheck
            any::covr
            any::OpenMx
            any::mvtnorm
            any::DiagrammeRsvg
            any::rsvg
          needs: check

      - name: Check Package Structure
        uses: r-lib/actions/check-r-package@v2
        with:
          build_args: 'c("--no-manual", "--no-build-vignettes")'
          args: 'c("--no-manual", "--as-cran", "--no-vignettes")'
          error-on: '"error"'

      - name: Code Coverage
        run: covr::codecov()
        shell: Rscript {0}

  # Full matrix (multiple OS + R versions) — runs weekly or on manual trigger
  full:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ${{ matrix.config.os }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: ubuntu-latest, r: 'release'}
          - {os: ubuntu-latest, r: 'devel'}
          - {os: ubuntu-latest, r: 'oldrel-1'}
          - {os: macos-latest, r: 'release'}
          - {os: windows-latest, r: 'release'}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up R ${{ matrix.config.r }}
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          use-public-rspm: true

      # No GenomicSEM here: parity vs GenomicSEM is manual-only
      # (inst/developer/GenomicSEM/; needs a pinned older lavaan). Not used by testthat.
      - name: Install Package Dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::remotes
            any::rcmdcheck
            any::OpenMx
            any::mvtnorm
            any::DiagrammeRsvg
            any::rsvg
          needs: check

      - name: Check Package Structure
        uses: r-lib/actions/check-r-package@v2
        with:
          args: 'c("--no-manual", "--as-cran")'
          error-on: '"error"'
